{% extends "base.html" %}
{% block title %}Login - Sistem Akademik{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <div style="width:56px;height:56px;border-radius:50%;border:2px solid var(--gold);
                display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
                font-family:'Fraunces',serif;font-weight:700;font-size:19px;color:var(--gold-light);">
        SA
    </div>
    <h4 style="color:#F4F1E8;margin-bottom:2px;">Sistem Analitik Akademik</h4>
    <p style="color:#9FB2C6;font-size:13.5px;margin:0;">Universitas Muhammadiyah Jember</p>
</div>

<div class="card" style="border:none;box-shadow:var(--shadow-md);">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label" style="font-size:13.5px;font-weight:500;">Username / NIM</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-size:13.5px;font-weight:500;">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Masuk</button>
        </form>
    </div>
</div>

<p class="text-center small mt-3" style="color:#B7C4D3;">
    Akun demo (password: <code style="color:var(--gold-light);">password123</code>):<br>
    admin &middot; kaprodi &middot; dosen.ahmad &middot; dosen.siti<br>
    mahasiswa: 2024210011 &middot; 2022210003
</p>
{% endblock %}
